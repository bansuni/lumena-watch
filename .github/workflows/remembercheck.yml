name: remember-job-check

on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"   # 10분 간격 (다른 워크플로우와 분산)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: remember-job-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Remember job check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python job_remember.py

      - name: Save seen list
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen_remember.txt || true
          git commit -m "update seen_remember" || echo "no change to commit"
          git pull --rebase --autostash || true
          git push || echo "nothing to push"
